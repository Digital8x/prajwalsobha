<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Thank You | Sobha One World</title>
  <link rel="icon" href="images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16711552862"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'AW-16711552862');
  </script>

  <!-- Event snippet for conversion page -->
  <script>
    gtag('event', 'conversion', {'send_to': 'AW-10964678521/R9_gCPz286scEPnuruwo'});
  </script>

  <style>
    .thankyou-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
    .thankyou-card{max-width:520px;padding:60px 48px;}
    .thankyou-icon{font-size:4rem;margin-bottom:20px;display:block;}
    .thankyou-card h1{font-size:2.2rem;margin-bottom:12px;}
    .thankyou-card h1 span{color:var(--gold);}
    .thankyou-card p{color:var(--text-secondary);margin-bottom:24px;}
    .thankyou-card .btn{margin-top:8px;}
    .countdown{color:var(--text-muted);font-size:0.85rem;margin-top:16px;}
  </style>
</head>
<body>
  <div class="thankyou-wrap">
    <div class="thankyou-card glass">
      <span class="thankyou-icon">✅</span>
      <h1>Thank <span>You!</span></h1>
      <p>Your enquiry has been received successfully. Our team will contact you shortly with complete details about Sobha One World.</p>
      <a href="/" class="btn btn-gold">← Back to Home</a>
      <p class="countdown">Redirecting in <span id="timer">5</span> seconds...</p>
    </div>
  </div>
  <script>
    let t = 5;
    const el = document.getElementById('timer');
    const iv = setInterval(() => { t--; el.textContent = t; if (t <= 0) { clearInterval(iv); window.location.href = '/'; } }, 1000);
  </script>
</body>
</html>
